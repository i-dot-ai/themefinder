name: Deploy docs

on:
  push:
    branches: [main]

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: |
          uv sync --extra docs

      - name: Deploy docs
        run: |
          uv run mkdocs gh-deploy --force
